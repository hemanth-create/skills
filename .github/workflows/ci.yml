name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-docs:
    name: Validate skill docs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "pyyaml>=6,<7"

      - name: Validate SKILL.md front matter and Markdown links
        run: python3 .github/scripts/check_docs.py
